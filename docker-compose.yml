version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-batken}
      POSTGRES_PASSWORD: ${DB_PASS:-batken_pass}
      POSTGRES_DB: ${DB_NAME:-batjetkiret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-batken} -d ${DB_NAME:-batjetkiret}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-batken}:${DB_PASS:-batken_pass}@db:5432/${DB_NAME:-batjetkiret}
      PORT: "8000"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - uploads_data:/app/uploads

volumes:
  postgres_data:
  uploads_data:
