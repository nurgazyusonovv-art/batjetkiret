# ── Batken Express — single-server nginx config ──────────────────────────────
# Replace every occurrence of "yourdomain.com" with your real domain.
#
# Sub-domains used:
#   yourdomain.com          → web-client  (user app)
#   admin.yourdomain.com    → admin-panel
#   enterprise.yourdomain.com → enterprise-panel
#   api.yourdomain.com      → FastAPI backend  (port 8000)
#
# SSL is handled by Certbot — run after first deploy:
#   certbot --nginx -d yourdomain.com -d admin.yourdomain.com \
#           -d enterprise.yourdomain.com -d api.yourdomain.com

# ── Upstream ─────────────────────────────────────────────────────────────────
upstream backend {
    server 127.0.0.1:8000;
}

# ── Web Client ────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    root /var/www/batken/web-client;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ── Admin Panel ───────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name admin.yourdomain.com;

    root /var/www/batken/admin-panel;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ── Enterprise Panel ──────────────────────────────────────────────────────────
server {
    listen 80;
    server_name enterprise.yourdomain.com;

    root /var/www/batken/enterprise-panel;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ── API Backend ───────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.yourdomain.com;

    client_max_body_size 20M;

    # Uploaded files served directly by nginx (faster than FastAPI)
    location /uploads/ {
        alias /var/www/batken/uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # WebSocket support
    location /orders/ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # All other API requests
    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }
}
